<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Yandex Alice — Device Dial</title>
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
      :root {
        --void: #0b0614;
        --panel: #140a22;
        --panel-2: #1c0f30;
        --neon: #a855f7;
        --glow: #c026ff;
        --text: #f3e8ff;
        --muted: #c4b5fd;
        --dim: #6b21a8;
      }
      body {
        --sdpi-bgcolor: var(--void);
        --sdpi-color: var(--text);
        --sdpi-bordercolor: var(--neon);
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .hint {
        color: var(--muted);
        font-size: 11px;
        margin: 4px 0 10px;
        line-height: 1.35;
      }
      .picker-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
        width: 100%;
      }
      .picker {
        position: relative;
        flex: 1;
        min-width: 0;
      }
      .picker-btn {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(180deg, var(--panel-2), var(--panel));
        color: var(--text);
        border: 1px solid color-mix(in srgb, var(--neon) 55%, transparent);
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
        text-align: left;
        box-shadow: 0 0 0 1px rgba(192, 38, 255, 0.08);
      }
      .picker-btn:hover {
        border-color: var(--glow);
      }
      .picker-btn .glyph {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: radial-gradient(circle at 40% 30%, #2a1050, #12081f);
        border: 1px solid var(--dim);
        display: grid;
        place-items: center;
        flex-shrink: 0;
        color: var(--neon);
        font-size: 13px;
      }
      .picker-btn .meta {
        min-width: 0;
        flex: 1;
      }
      .picker-btn .name {
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .picker-btn .sub {
        font-size: 10px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .picker-btn .chev {
        color: var(--muted);
        font-size: 10px;
      }
      .menu {
        display: none;
        position: absolute;
        z-index: 40;
        left: 0;
        right: 0;
        top: calc(100% + 6px);
        max-height: 200px;
        overflow: auto;
        background: #10081c;
        border: 1px solid color-mix(in srgb, var(--neon) 60%, #000);
        border-radius: 12px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.55);
        padding: 6px;
      }
      .picker.open .menu {
        display: block;
      }
      .menu-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        padding: 8px;
        cursor: pointer;
        text-align: left;
      }
      .menu-item:hover,
      .menu-item.active {
        background: linear-gradient(90deg, rgba(168, 85, 247, 0.28), rgba(168, 85, 247, 0.08));
      }
      .menu-item .glyph {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: #1a0b2e;
        border: 1px solid var(--dim);
        display: grid;
        place-items: center;
        color: var(--neon);
        font-size: 12px;
        flex-shrink: 0;
      }
      .menu-item .name {
        font-size: 12px;
        font-weight: 600;
      }
      .menu-item .sub {
        font-size: 10px;
        color: var(--muted);
      }
      .menu-empty {
        padding: 12px;
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }
      button.refresh {
        background: linear-gradient(180deg, #8b5cf6, #6d28d9);
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 0 12px;
        cursor: pointer;
        min-width: 40px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
      }
      .field label {
        font-size: 10px;
        color: var(--muted);
      }
      select.native,
      input.native {
        width: 100%;
        background: var(--panel);
        color: var(--text);
        border: 1px solid color-mix(in srgb, var(--neon) 45%, transparent);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 12px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        width: 100%;
      }
      #status {
        color: var(--muted);
        font-size: 11px;
        min-height: 16px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <sdpi-item label="OAuth token">
      <sdpi-textarea
        setting="oauthToken"
        global="true"
        rows="3"
        placeholder="Paste Yandex OAuth token"
      ></sdpi-textarea>
    </sdpi-item>
    <p class="hint">
      Dial controls a numeric range (brightness, volume, temperature…). Rotate to change,
      press for the action below.
    </p>

    <sdpi-item label="Device">
      <div class="picker-row">
        <div class="picker" id="devicePicker">
          <button class="picker-btn" id="pickerBtn" type="button">
            <span class="glyph">◐</span>
            <span class="meta">
              <div class="name" id="pickerName">— refresh list —</div>
              <div class="sub" id="pickerSub">Devices with range controls</div>
            </span>
            <span class="chev">▾</span>
          </button>
          <div class="menu" id="deviceMenu"></div>
        </div>
        <button class="refresh" id="refreshBtn" type="button">↻</button>
      </div>
    </sdpi-item>

    <sdpi-item label="Control">
      <div class="field">
        <select class="native" id="instanceSelect">
          <option value="">— select device first —</option>
        </select>
      </div>
    </sdpi-item>

    <sdpi-item label="Step">
      <div class="grid-2">
        <div class="field">
          <label>Value step (0 = auto)</label>
          <input class="native" id="stepInput" type="number" min="0" step="0.5" placeholder="auto" />
        </div>
        <div class="field">
          <label>Tick multiplier</label>
          <select class="native" id="multSelect">
            <option value="1">1×</option>
            <option value="2">2×</option>
            <option value="3">3×</option>
            <option value="5">5×</option>
          </select>
        </div>
      </div>
    </sdpi-item>

    <sdpi-item label="Press / touch">
      <select class="native" id="pressSelect">
        <option value="toggle">Toggle on/off</option>
        <option value="refresh">Refresh value</option>
        <option value="max">Jump to max</option>
        <option value="min">Jump to min</option>
        <option value="mid">Jump to mid</option>
      </select>
    </sdpi-item>

    <sdpi-item label="Options">
      <sdpi-checkbox setting="invertRotate">Invert rotate direction</sdpi-checkbox>
    </sdpi-item>

    <sdpi-item label="Sync every (sec)">
      <sdpi-range
        setting="pollIntervalSeconds"
        min="10"
        max="120"
        step="5"
        default="30"
      ></sdpi-range>
    </sdpi-item>
    <p id="status"></p>

    <script>
      const { streamDeckClient } = SDPIComponents;
      let loadTimer;
      let devices = [];
      let selectedId = "";

      const INSTANCE_GLYPH = {
        brightness: "☀",
        volume: "♪",
        temperature: "🌡",
        humidity: "💧",
        open: "☰",
        channel: "#",
      };

      function setStatus(text) {
        document.getElementById("status").textContent = text || "";
      }

      function selectedDevice() {
        return devices.find((d) => d.id === selectedId);
      }

      function paintButton() {
        const d = selectedDevice();
        const name = document.getElementById("pickerName");
        const sub = document.getElementById("pickerSub");
        if (!d) {
          name.textContent = devices.length ? "— select device —" : "— no dial devices —";
          sub.textContent = "Needs brightness / volume / temp…";
          return;
        }
        name.textContent = d.name;
        const instances = (d.ranges || []).map((r) => r.instance).join(", ");
        sub.textContent = [d.room, instances].filter(Boolean).join(" · ");
      }

      function fillInstances(preferred) {
        const select = document.getElementById("instanceSelect");
        const d = selectedDevice();
        select.innerHTML = "";
        if (!d || !(d.ranges || []).length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "— no ranges —";
          select.appendChild(opt);
          return;
        }
        for (const range of d.ranges) {
          const opt = document.createElement("option");
          opt.value = range.instance;
          const unit = range.unit ? ` · ${range.unit.replace("unit.", "")}` : "";
          opt.textContent = `${INSTANCE_GLYPH[range.instance] || "◐"} ${range.instance} (${range.min}–${range.max}${unit})`;
          select.appendChild(opt);
        }
        if (preferred && [...select.options].some((o) => o.value === preferred)) {
          select.value = preferred;
        }
      }

      function fillMenu() {
        const menu = document.getElementById("deviceMenu");
        menu.innerHTML = "";
        if (!devices.length) {
          menu.innerHTML = '<div class="menu-empty">No devices with range controls</div>';
          paintButton();
          fillInstances();
          return;
        }
        for (const d of devices) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "menu-item" + (d.id === selectedId ? " active" : "");
          const first = (d.ranges || [])[0]?.instance || "";
          btn.innerHTML =
            '<span class="glyph">' +
            (INSTANCE_GLYPH[first] || "◐") +
            '</span><span class="meta"><div class="name"></div><div class="sub"></div></span>';
          btn.querySelector(".name").textContent = d.name;
          btn.querySelector(".sub").textContent = [d.room, (d.ranges || []).map((r) => r.instance).join(", ")]
            .filter(Boolean)
            .join(" · ");
          btn.addEventListener("click", () => {
            selectedId = d.id;
            document.getElementById("devicePicker").classList.remove("open");
            paintButton();
            fillInstances(d.ranges?.[0]?.instance);
            void persist();
          });
          menu.appendChild(btn);
        }
        paintButton();
      }

      async function persist() {
        const d = selectedDevice();
        const payload = await streamDeckClient.getSettings();
        const settings = { ...(payload.settings || {}) };
        if (d) {
          settings.deviceId = d.id;
          settings.deviceName = d.name;
          settings.deviceType = d.type || "";
        }
        settings.rangeInstance = document.getElementById("instanceSelect").value || "";
        const stepRaw = document.getElementById("stepInput").value;
        settings.step = stepRaw === "" ? undefined : Number(stepRaw);
        settings.stepMultiplier = Number(document.getElementById("multSelect").value) || 1;
        settings.pressAction = document.getElementById("pressSelect").value || "toggle";
        streamDeckClient.setSettings(settings);
      }

      async function restore() {
        const payload = await streamDeckClient.getSettings();
        const s = payload?.settings || {};
        selectedId = s.deviceId || selectedId || "";
        fillMenu();
        fillInstances(s.rangeInstance);
        if (s.step != null && s.step !== "") document.getElementById("stepInput").value = s.step;
        if (s.stepMultiplier) document.getElementById("multSelect").value = String(s.stepMultiplier);
        if (s.pressAction) document.getElementById("pressSelect").value = s.pressAction;
      }

      async function refreshHome() {
        setStatus("Loading…");
        clearTimeout(loadTimer);
        loadTimer = setTimeout(() => {
          setStatus("No response from plugin. Is the plugin running?");
        }, 8000);
        try {
          await streamDeckClient.send("sendToPlugin", { event: "refreshHome" });
        } catch (error) {
          clearTimeout(loadTimer);
          setStatus("Send failed: " + (error?.message || error));
        }
      }

      document.getElementById("pickerBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        document.getElementById("devicePicker").classList.toggle("open");
      });
      document.getElementById("refreshBtn").addEventListener("click", () => void refreshHome());
      document.addEventListener("click", () => {
        document.getElementById("devicePicker").classList.remove("open");
      });
      document.getElementById("instanceSelect").addEventListener("change", () => void persist());
      document.getElementById("stepInput").addEventListener("change", () => void persist());
      document.getElementById("multSelect").addEventListener("change", () => void persist());
      document.getElementById("pressSelect").addEventListener("change", () => void persist());

      streamDeckClient.sendToPropertyInspector.subscribe((ev) => {
        const payload = ev?.payload ?? {};
        if (payload.event === "homeLoading") {
          setStatus("Plugin connected, loading…");
          return;
        }
        clearTimeout(loadTimer);
        if (payload.event === "homeData") {
          devices = (payload.devices || []).filter((d) => (d.ranges || []).length > 0);
          void restore().then(() => setStatus(`Loaded ${devices.length} dial-capable devices`));
        }
        if (payload.event === "homeError") {
          setStatus(`Error: ${payload.detail || payload.message}`);
        }
      });

      window.addEventListener("load", () => setTimeout(() => void refreshHome(), 400));
    </script>
  </body>
</html>
