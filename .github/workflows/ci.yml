name: CI

on:
  push:
    branches: [main]
    tags:
      - "cursor-usage-v*"
      - "yandex-alice-v*"
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin:
          - cursor-usage
          - yandex-alice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/${{ matrix.plugin }}/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y imagemagick
      - run: npm ci && npm run icons && npm run build
        working-directory: plugins/${{ matrix.plugin }}
      - run: |
          SD_PLUGIN=$(ls -d *.sdPlugin | head -1)
          npx streamdeck validate "$SD_PLUGIN"
        working-directory: plugins/${{ matrix.plugin }}

  # One GitHub Release per plugin tag. Examples:
  #   git tag yandex-alice-v0.3.0.0 && git push origin yandex-alice-v0.3.0.0
  #   git tag cursor-usage-v0.3.0.0 && git push origin cursor-usage-v0.3.0.0
  pack:
    runs-on: ubuntu-latest
    needs: validate-and-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve plugin from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            cursor-usage-v*)
              echo "plugin=cursor-usage" >> "$GITHUB_OUTPUT"
              echo "title=True Cursor Usage ${TAG#cursor-usage-}" >> "$GITHUB_OUTPUT"
              ;;
            yandex-alice-v*)
              echo "plugin=yandex-alice" >> "$GITHUB_OUTPUT"
              echo "title=Yandex Alice Home ${TAG#yandex-alice-}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported tag '$TAG'. Use cursor-usage-v* or yandex-alice-v*."
              exit 1
              ;;
          esac

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/${{ steps.meta.outputs.plugin }}/package-lock.json

      - run: sudo apt-get update && sudo apt-get install -y imagemagick

      - run: npm ci && npm run pack
        working-directory: plugins/${{ steps.meta.outputs.plugin }}

      - name: Publish plugin release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.title }}
          files: plugins/${{ steps.meta.outputs.plugin }}/releases/*.streamDeckPlugin
          generate_release_notes: true
          # Each plugin release is independent; newest tag becomes repo "Latest".
          make_latest: true
