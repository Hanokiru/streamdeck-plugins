name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/cursor-usage/package-lock.json
      - run: npm ci
        working-directory: plugins/cursor-usage
      - run: npx streamdeck validate com.hanokiru.cursor-usage.sdPlugin
        working-directory: plugins/cursor-usage

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/cursor-usage/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y imagemagick
      - run: npm ci && npm run icons && npm run build
        working-directory: plugins/cursor-usage

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/cursor-usage/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y imagemagick
      - run: npm ci && npm run pack
        working-directory: plugins/cursor-usage
      - uses: softprops/action-gh-release@v2
        with:
          files: plugins/cursor-usage/releases/*.streamDeckPlugin
          generate_release_notes: true
